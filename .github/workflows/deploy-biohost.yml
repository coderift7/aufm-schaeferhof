name: Deploy to BIOHOST

on:
  push:
    branches: [main]
  workflow_dispatch: # Manual trigger from GitHub UI

concurrency:
  group: biohost
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright smoke tests
        run: npm test

      - name: Build for Lighthouse
        run: npm run build

      - name: Run Lighthouse CI
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: test
    env:
      SITE_URL: ${{ secrets.SITE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Inject SMTP password
        env:
          SMTP_PW: ${{ secrets.SMTP_PASSWORD }}
        run: |
          ESCAPED=$(printf '%s\n' "$SMTP_PW" | sed 's/[&/\]/\\&/g')
          sed -i "s|%%SMTP_PASSWORD%%|${ESCAPED}|" ./out/contact.php

      - name: Verify SMTP password injected
        run: |
          if grep -q '%%SMTP_PASSWORD%%' ./out/contact.php; then
            echo "ERROR: SMTP_PASSWORD was not injected!"
            exit 1
          fi

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /
